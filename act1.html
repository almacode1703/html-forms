<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML-FORM-1</title>

     <style>
        form{
            border:1px solid;
            padding: 20px;
            width: 400px;
            margin: 0 auto;
            background-color: rgb(255, 252, 252);
        }
     </style> 
</head>
<body>

       
       <form action="congrats.html">
        <h1>Students Registration Form</h1>

        <!-- Entering Name -->
         <div>
            <label for="">Name</label> <br>
            <input type="text" name="" id="" placeholder="Enter your name">
         </div> <br><br>

         <!--Entering Email  -->
         <div>
            <label for="">Enter Email</label><br>
            <input type="email" name="" id="" placeholder="litesh@gmail.com">
         </div><br><br>

         <!-- Contact Number -->
          <div>
            <label for="">Contact Number</label><br>
            <input type="number" name="" id="">
          </div><br><br>

          <!-- Gender -->
          <div>
             <label for="">Select your gender</label><br>
             <input type="radio" name="gender" id="female">Female 
             <input type="radio" name="gender" id="male">Male <br>
          </div><br><br>

          <!-- Fav Cities -->
           <div>
            <label for="">Select your Favourite cities</label> <br>
            <input type="checkbox" name="" id="city" value="New Delhi">New Delhi 
            <input type="checkbox" name="" id="city" value="Mumbai">Mumbai <br>
           </div><br><br>

           <!--Submit  -->
           <div>
            <input type="submit" value="Sibmit">
           </div><br><br>

       </form>
    
</body>
</html>
